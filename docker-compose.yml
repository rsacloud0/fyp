services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: thinkia-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: thinkia-backend
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    restart: unless-stopped
